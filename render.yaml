services:
  # 1. Backend API Service
  - type: web
    name: mywoods-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://mywoods-frontend.onrender.com # Replace with your actual frontend Render URL after creation
      - key: MONGO_URI
        sync: false # You will enter your MongoDB Atlas URI in the Render dashboard

  # 2. Frontend Static Site Service
  - type: web
    name: mywoods-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mywoods-backend
          type: web
          property: url
      - key: PORT
        value: 10000
